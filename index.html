<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeathSword Interactive</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --primary: #3b82f6; --accent: #6366f1; --white: #f8fafc; }
        body { margin: 0; background: var(--bg); color: var(--white); font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; text-align: center; }
        .gradient-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, rgba(59, 130, 246, 0.15) 0%, rgba(15, 23, 42, 1) 70%); z-index: -1; }
        h1 { font-family: 'Orbitron', sans-serif; font-size: 3rem; margin: 0; background: linear-gradient(to right, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 4px; }
        p { opacity: 0.7; font-size: 1.1rem; margin-top: 10px; }
        .links { margin-top: 40px; display: flex; gap: 20px; }
        a { color: var(--white); text-decoration: none; border: 1px solid rgba(255,255,255,0.1); padding: 12px 24px; border-radius: 50px; background: rgba(255,255,255,0.05); transition: 0.3s; }
        a:hover { background: var(--primary); transform: translateY(-3px); box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3); }
    </style>
</head>
<body>
    <div class="gradient-bg"></div>
    <h1>DEATHSWORD INTERACTIVE</h1>
    <p>Premium Digital Experiences & Apps</p>
    <div class="links">
        <a href="privacy.html">Privacy Policy</a>
        <a href="mailto:contact@deathsword-interactive.github.io">Contact</a>
    </div>
</body>
</html>
